<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChainLens | Multi-Chain Scanner</title>
  
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
  <link rel="shortcut icon" href="/favicon/favicon.ico">
  <link rel="manifest" href="/favicon/site.webmanifest">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Space Grotesk', 'sans-serif'],
            heading: ['Syne', 'sans-serif'],
          },
          animation: {
            'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          }
        }
      }
    }
  </script>

  <style>
    body { font-family: 'Space Grotesk', sans-serif; scroll-behavior: smooth; }
    .font-heading { font-family: 'Syne', sans-serif; }
    
    .bg-solana-gradient {
      background: linear-gradient(45deg, #9945FF, #14F195);
    }
    .bg-solana-gradient-soft {
      background: linear-gradient(45deg, rgba(153,69,255,0.85), rgba(20,241,149,0.85));
    }

    .glass-card {
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .switch-bg {
      width: 48px;
      height: 24px;
      display: flex;
      align-items: center;
      padding: 3px;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .switch-dot {
      width: 18px;
      height: 18px;
      transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }
    .translate-x-6 { transform: translateX(24px); }

    .modal-enter { animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .dark-scroll::-webkit-scrollbar { width: 8px; }
    .dark-scroll::-webkit-scrollbar-track { background: #0f172a; }
    .dark-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    
    /* Profile page styles */
    .wallet-card {
      transition: all 0.2s ease;
    }
    .wallet-card:hover {
      transform: translateY(-1px);
    }
    .chain-pill-evm    { background: linear-gradient(135deg, #627EEA, #3c3c3d); }
    .chain-pill-solana { background: linear-gradient(135deg, #9945FF, #14F195); }
    .chain-pill-cardano{ background: linear-gradient(135deg, #0033AD, #00BAFF); }
    .social-btn {
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .social-btn:hover { transform: translateY(-2px); }
    .social-btn:active { transform: translateY(0); }

    .slide-up-2 { animation: slideUp 0.4s ease-out 0.08s both; }
    .slide-up-3 { animation: slideUp 0.4s ease-out 0.16s both; }
    .slide-up-4 { animation: slideUp 0.4s ease-out 0.24s both; }

        height: 850px;

        position: relative;

        width: 100%;
        flex-grow: 1;
        border: none;

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    const App = () => {
      const [activeTab, setActiveTab] = useState('portfolio'); 
      const [evmAddr, setEvmAddr] = useState('');
      const [solAddr, setSolAddr] = useState('');
      const [adaAddr, setAdaAddr] = useState('');
      const [activeChains, setActiveChains] = useState(['ethereum', 'polygon', 'base', 'avalanche', 'optimism', 'arbitrum', 'blast', 'zora', 'apechain', 'soneium', 'ronin', 'worldchain', 'gnosis', 'hyperevm', 'solana', 'cardano', 'abstract', 'monad']);
      
      const [nfts, setNfts] = useState([]);
      const [loading, setLoading] = useState(false);
      const [darkMode, setDarkMode] = useState(false);
      const [selectedAsset, setSelectedAsset] = useState(null);
      const [tokenMode, setTokenMode] = useState(false);
      const [viewMode, setViewMode] = useState('nfts'); // 'nfts', 'tokens', 'transactions'
      const [transactions, setTransactions] = useState([]);
      const [isListView, setIsListView] = useState(false);
      
      const [searchQuery, setSearchQuery] = useState('');
      const [sortBy, setSortBy] = useState('chain'); 

      const [resolvedEvm, setResolvedEvm] = useState(null);
      const [isResolving, setIsResolving] = useState(false);

      const [hiddenIds, setHiddenIds] = useState(() => JSON.parse(localStorage.getItem('hiddenAssets') || '[]'));
      const [spamIds, setSpamIds] = useState(() => JSON.parse(localStorage.getItem('spamAssets') || '[]'));
      const [showManager, setShowManager] = useState(false);

      const [marketData, setMarketData] = useState([]);
      const [marketLoading, setMarketLoading] = useState(false);
      const [marketSearch, setMarketSearch] = useState('');
      const [selectedCoin, setSelectedCoin] = useState(null);
      const [showChart, setShowChart] = useState(false);
      const [chartData, setChartData] = useState(null);
      const [loadingChart, setLoadingChart] = useState(false);
      const [chartTimeframe, setChartTimeframe] = useState('7d'); // 1d, 7d, 1m, 1y, all
      const [nativePrices, setNativePrices] = useState({}); // { ETH: 3000, SOL: 85, ADA: 0.72, MON: 0.02 }
      const [convCoin, setConvCoin] = useState('');   // coin amount input
      const [convUsd, setConvUsd] = useState('');     // usd amount input

      // ── Auth & Profile state ───────────────────────────────────────────────
      const [authToken, setAuthToken] = useState(() => localStorage.getItem('cl_token'));
      const [userProfile, setUserProfile] = useState(null);
      const [authLoading, setAuthLoading] = useState(false);
      const [walletConnecting, setWalletConnecting] = useState(null); // 'evm'|'solana'|'cardano'|'google'|'discord'
      const [autoScan, setAutoScan] = useState(false);
      const [editingWallet, setEditingWallet] = useState(null); // wallet id being renamed
      const [walletLabelInput, setWalletLabelInput] = useState('');
      const [profileError, setProfileError] = useState(null);
      const [editingName, setEditingName] = useState(false);
      const [nameInput, setNameInput] = useState('');

      const chainStyles = {
        ethereum: { color: 'bg-[#3c3c3d]', label: 'Ethereum', native: 'ETH' },
        polygon: { color: 'bg-[#7B3FE4]', label: 'Polygon', native: 'POL' },
        base: { color: 'bg-[#0052FF]', label: 'Base', native: 'ETH' },
        avalanche: { color: 'bg-[#E84142]', label: 'Avalanche', native: 'AVAX' },
        optimism: { color: 'bg-[#FF0420]', label: 'Optimism', native: 'ETH' },
        arbitrum: { color: 'bg-[#28A0F0]', label: 'Arbitrum', native: 'ETH' },
        blast: { color: 'bg-[#FCFC03] text-black', label: 'Blast', native: 'ETH' },
        zora: { color: 'bg-gradient-to-r from-purple-500 to-pink-500', label: 'Zora', native: 'ETH' },
        apechain: { color: 'bg-[#0144d0]', label: 'Ape Chain', native: 'APE' },
        soneium: { color: 'bg-[#0070D1]', label: 'Soneium', native: 'ETH' },
        ronin: { color: 'bg-[#1273EA]', label: 'Ronin', native: 'RON' },
        worldchain: { color: 'bg-gradient-to-r from-blue-500 to-green-500', label: 'World Chain', native: 'ETH' },
        gnosis: { color: 'bg-[#04795B]', label: 'Gnosis', native: 'xDAI' },
        hyperevm: { color: 'bg-[#6366f1]', label: 'HyperEVM', native: 'HYPE' },
        solana: { color: 'bg-solana-gradient-soft', label: 'Solana', native: 'SOL' },
        cardano: { color: 'bg-[#0033AD]', label: 'Cardano', native: 'ADA' },
        monad: { color: 'bg-[#836EF9]', label: 'Monad', native: 'MON' },
        abstract: { color: 'bg-[#00FF85] text-black', label: 'Abstract', native: 'ETH' }
      };

      const chainPriority = {
        'cardano': 1,
        'solana': 2,
        'ethereum': 3,
        'abstract': 4,
        'monad': 5,
        'base': 6,
        'polygon': 7,
        'avalanche': 8,
        'optimism': 9,
        'arbitrum': 10,
        'blast': 11,
        'zora': 12,
        'apechain': 13,
        'soneium': 14,
        'ronin': 15,
        'worldchain': 16,
        'gnosis': 17,
        'hyperevm': 18
      };

      useEffect(() => {
        const savedMode = localStorage.getItem('darkMode');
        if (savedMode === 'true') setDarkMode(true);
      }, []);

      useEffect(() => {
        localStorage.setItem('darkMode', darkMode);
      }, [darkMode]);

      useEffect(() => {
        localStorage.setItem('hiddenAssets', JSON.stringify(hiddenIds));
        localStorage.setItem('spamAssets', JSON.stringify(spamIds));
      }, [hiddenIds, spamIds]);

      // ── Handle OAuth redirect token in URL ────────────────────────────────
      useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        const token = params.get('auth_token');
        const error = params.get('auth_error');
        const linked = params.get('linked'); // 'google' or 'discord' after link flow
        if (token) {
          setAuthToken(token);
          localStorage.setItem('cl_token', token);
          setActiveTab('profile');
          // Re-fetch profile immediately so newly linked social shows up
          if (linked) {
            fetch('/api/profile', { headers: { Authorization: `Bearer ${token}` } })
              .then(r => r.json())
              .then(p => { if (p && !p.error) setUserProfile(p); })
              .catch(() => {});
          }
          window.history.replaceState({}, '', window.location.pathname);
        }
        if (error) {
          const friendlyErrors = {
            google_not_configured: 'Google login is not set up yet. Use a wallet to sign in.',
            discord_not_configured: 'Discord login is not set up yet. Use a wallet to sign in.',
            google_failed: 'Google login failed. Please try again.',
            discord_failed: 'Discord login failed. Please try again.',
            link_failed: 'Failed to link account — please try again.',
            cancelled: 'Login was cancelled.',
            invalid_state: 'Login session expired. Please try again.',
          };
          setProfileError(friendlyErrors[error] || 'Login failed: ' + error.replace(/_/g,' '));
          setActiveTab('profile');
          window.history.replaceState({}, '', window.location.pathname);
        }
      }, []);

      // ── Fetch profile whenever token changes ──────────────────────────────
      useEffect(() => {
        if (!authToken) { setUserProfile(null); return; }
        setAuthLoading(true);
        fetch('/api/profile', { headers: { Authorization: `Bearer ${authToken}` } })
          .then(r => {
            if (r.status === 401) { setAuthToken(null); localStorage.removeItem('cl_token'); return null; }
            return r.json();
          })
          .then(data => { if (data) setUserProfile(data); })
          .catch(() => {})
          .finally(() => setAuthLoading(false));
      }, [authToken]);

      // ── Auto-scan when portfolio is loaded from profile ───────────────────
      useEffect(() => {
        if (autoScan && (evmAddr || solAddr || adaAddr)) {
          setAutoScan(false);
          handleScanAll();
        }
      }, [autoScan, evmAddr, solAddr, adaAddr]);

      // ── Auth helper: authenticated fetch ──────────────────────────────────
      const authFetch = (url, opts = {}) => fetch(url, {
        ...opts,
        headers: { 'Content-Type':'application/json', 'Authorization':`Bearer ${authToken}`, ...opts.headers }
      });

      const logout = () => {
        setAuthToken(null); setUserProfile(null);
        localStorage.removeItem('cl_token');
      };

      // ── Social logins (redirect to backend OAuth) ─────────────────────────
      const loginWithGoogle  = () => {
        setWalletConnecting('google');
        // Already logged in → LINK mode (attaches Google to current profile)
        // Not logged in → LOGIN mode (creates/finds account)
        const url = authToken
          ? `/auth/google?link_token=${encodeURIComponent(authToken)}`
          : '/auth/google';
        window.location.href = url;
      };
      const loginWithDiscord = () => {
        setWalletConnecting('discord');
        const url = authToken
          ? `/auth/discord?link_token=${encodeURIComponent(authToken)}`
          : '/auth/discord';
        window.location.href = url;
      };

      // ── Generic wallet connect helper ─────────────────────────────────────
      const connectWallet = async (chain, getAddrAndSig) => {
        setProfileError(null);
        setWalletConnecting(chain);
        try {
          const { address, signature, key } = await getAddrAndSig();

          // Get nonce
          const { nonce } = await fetch('/api/auth/nonce', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ address })
          }).then(r => r.json());

          // Sign nonce — also capture key here (Cardano CIP-30 returns it with the signature)
          const { signedSig, key: sigKey } = await getAddrAndSig(nonce);

          // Submit to backend
          const res = await fetch('/api/auth/wallet-login', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              ...(authToken ? { Authorization: `Bearer ${authToken}` } : {})
            },
            body: JSON.stringify({ chain, address, signature: signedSig, key: sigKey, nonce })
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Connection failed');

          if (!authToken && data.token) {
            setAuthToken(data.token);
            localStorage.setItem('cl_token', data.token);
          }
          if (data.profile) setUserProfile(data.profile);
          else if (authToken) {
            // Re-fetch profile after linking
            const p = await authFetch('/api/profile').then(r => r.json());
            setUserProfile(p);
          }
        } catch (e) {
          console.error(chain + ' connect error:', e);
          setProfileError(e.message || 'Connection failed');
        }
        setWalletConnecting(null);
      };

      // ── EVM (MetaMask / any injected) ─────────────────────────────────────
      const connectEVM = () => connectWallet('evm', async (nonce) => {
        if (!window.ethereum) throw new Error('MetaMask not found. Please install it.');
        const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
        const address = accounts[0];
        if (!nonce) return { address };
        const message = `ChainLens login\nAddress: ${address}\nNonce: ${nonce}`;
        const signedSig = await window.ethereum.request({ method: 'personal_sign', params: [message, address] });
        return { address, signedSig };
      });

      // ── Solana (Phantom / Backpack) ───────────────────────────────────────
      const connectSolana = () => connectWallet('solana', async (nonce) => {
        const wallet = window.solana || window.backpack;
        if (!wallet) throw new Error('Phantom not found. Please install it.');
        await wallet.connect();
        const address = wallet.publicKey.toString();
        if (!nonce) return { address };
        const message = `ChainLens login\nAddress: ${address}\nNonce: ${nonce}`;
        const encoded = new TextEncoder().encode(message);
        const { signature } = await wallet.signMessage(encoded, 'utf8');
        const signedSig = btoa(String.fromCharCode(...new Uint8Array(signature)));
        return { address, signedSig };
      });

      // ── Cardano hex → bech32 address converter (no extra npm lib needed) ──
      const cardanoBech32 = (hexAddr) => {
        try {
          const CHARSET = 'qpzry9x8gf2tvdw0s3jn54khce6mua7l';
          const bytes = hexAddr.match(/.{1,2}/g).map(b => parseInt(b, 16));
          const hrp = 'addr';
          let acc = 0, bits = 0;
          const data5 = [];
          for (const b of bytes) {
            acc = (acc << 8) | b; bits += 8;
            while (bits >= 5) { bits -= 5; data5.push((acc >> bits) & 31); }
          }
          if (bits > 0) data5.push((acc << (5 - bits)) & 31);
          const GEN = [0x3b6a57b2,0x26508e6d,0x1ea119fa,0x3d4233dd,0x2a1462b3];
          const polymod = (vals) => {
            let chk = 1;
            for (const v of vals) {
              const top = chk >> 25; chk = (chk & 0x1ffffff) << 5 ^ v;
              for (let i = 0; i < 5; i++) if ((top >> i) & 1) chk ^= GEN[i];
            } return chk;
          };
          const hrpExpand = (h) => {
            const r = [];
            for (const c of h) r.push(c.charCodeAt(0) >> 5);
            r.push(0);
            for (const c of h) r.push(c.charCodeAt(0) & 31);
            return r;
          };
          const vals = [...hrpExpand(hrp), ...data5, 0,0,0,0,0,0];
          const poly = polymod(vals) ^ 1;
          const chk = Array.from({length:6}, (_,i) => (poly >> (5*(5-i))) & 31);
          return hrp + '1' + [...data5, ...chk].map(d => CHARSET[d]).join('');
        } catch(e) { return hexAddr; } // fallback: return raw hex if conversion fails
      };

      // ── Cardano (Vespr / Eternl / Nami / Lace) — Vespr listed first ──────
      const connectCardano = () => connectWallet('cardano', async (nonce) => {
        const wName = ['vespr','eternl','nami','lace','flint'].find(w => window.cardano?.[w]);
        if (!wName) throw new Error('No Cardano wallet found. Install Vespr or Eternl.');
        const api = await window.cardano[wName].enable();
        // getUsedAddresses() returns hex-encoded bytes — must convert to bech32 addr1q...
        const rawAddrs = await api.getUsedAddresses();
        const rawHex = rawAddrs.length > 0 ? rawAddrs[0] : await api.getChangeAddress();
        // If already bech32 (starts with 'addr'), use as-is; otherwise convert
        const address = (typeof rawHex === 'string' && rawHex.startsWith('addr'))
          ? rawHex
          : cardanoBech32(rawHex);
        if (!nonce) return { address };
        const message = `ChainLens login\nAddress: ${address}\nNonce: ${nonce}`;
        const hexMsg = Array.from(new TextEncoder().encode(message))
          .map(b => b.toString(16).padStart(2,'0')).join('');
        // signData needs the raw wallet format (rawHex), not our converted bech32
        const { signature: signedSig, key } = await api.signData(rawHex, hexMsg);
        return { address, signedSig, key };
      });

      // ── Load portfolio from linked wallets ────────────────────────────────
      const loadMyPortfolio = () => {
        if (!userProfile?.cl_wallets) return;
        const wallets = userProfile.cl_wallets;
        const pick = (chain) => wallets.find(w => w.chain === chain && w.is_primary) || wallets.find(w => w.chain === chain);
        const evm = pick('evm'); const sol = pick('solana'); const ada = pick('cardano');
        if (evm) setEvmAddr(evm.address);
        if (sol) setSolAddr(sol.address);
        if (ada) setAdaAddr(ada.address);
        setAutoScan(true);
        setActiveTab('portfolio');
      };

      // ── Rename wallet ──────────────────────────────────────────────────────
      const saveWalletLabel = async (walletId) => {
        try {
          await authFetch(`/api/profile/wallet/${walletId}`, {
            method: 'PATCH', body: JSON.stringify({ label: walletLabelInput })
          });
          const p = await authFetch('/api/profile').then(r => r.json());
          setUserProfile(p);
        } catch (e) { setProfileError('Failed to save label'); }
        setEditingWallet(null);
      };

      // ── Rename display name ────────────────────────────────────────────────
      const saveName = async () => {
        const trimmed = nameInput.trim();
        if (!trimmed) { setEditingName(false); return; }
        try {
          await authFetch('/api/profile', {
            method: 'PATCH', body: JSON.stringify({ display_name: trimmed })
          });
          const p = await authFetch('/api/profile').then(r => r.json());
          setUserProfile(p);
        } catch (e) { setProfileError('Failed to save name'); }
        setEditingName(false);
      };

      // ── Delete wallet ──────────────────────────────────────────────────────
      const unlinkWallet = async (walletId) => {
        if (!confirm('Remove this wallet from your profile?')) return;
        await authFetch(`/api/profile/wallet/${walletId}`, { method: 'DELETE' });
        const p = await authFetch('/api/profile').then(r => r.json());
        setUserProfile(p);
      };

      // ── Set primary wallet ─────────────────────────────────────────────────
      const setPrimary = async (walletId) => {
        await authFetch(`/api/profile/wallet/${walletId}`, {
          method: 'PATCH', body: JSON.stringify({ is_primary: true })
        });
        const p = await authFetch('/api/profile').then(r => r.json());
        setUserProfile(p);
      };

      const truncAddr = (addr) => addr ? addr.substring(0,8) + '…' + addr.slice(-6) : '';

      // ── CoinGecko image map — built from already-loaded market data, zero extra API calls ──
      // Keys: lowercase symbol ("btc", "eth", "ada") → CoinGecko image URL
      const coinImageMap = useMemo(() => {
        var map = {};
        (marketData || []).forEach(function(coin) {
          if (coin.symbol && coin.image) map[coin.symbol.toLowerCase()] = coin.image;
          if (coin.id && coin.image) map[coin.id.toLowerCase()] = coin.image;
        });
        return map;
      }, [marketData]);

      // ── Resolve image: CoinGecko first, then fix raw IPFS/Arweave URLs ──────
      const resolveImg = function(url, symbol) {
        // Try CoinGecko map by symbol first
        if (symbol && coinImageMap[symbol.toLowerCase()]) return coinImageMap[symbol.toLowerCase()];
        if (!url) return '';
        if (url.indexOf('ipfs://') === 0) return 'https://ipfs.io/ipfs/' + url.slice(7);
        if (url.indexOf('ar://') === 0) return 'https://arweave.net/' + url.slice(5);
        if (url.indexOf('cloudflare-ipfs.com') > -1) return url.replace('cloudflare-ipfs.com', 'ipfs.io');
        return url;
      };

      // ── SVG fallback — colored circle with token initials, no external CDN ──
      const imgFallbackSvg = function(symbol, chain) {
        var colors = {solana:'14F195',cardano:'0033AD',ethereum:'627EEA',polygon:'8247E5',
                      base:'0052FF',avalanche:'E84142',optimism:'FF0420',arbitrum:'28A0F0',
                      blast:'FCFC03',ronin:'1273EA',gnosis:'04795B'};
        var bg = colors[chain] || '334155';
        var text = encodeURIComponent(((symbol || '?').substring(0,3)).toUpperCase());
        var tc = bg === 'FCFC03' ? '000000' : 'ffffff';

                                      // Other token: use backend nativePrice × nativeUsd
                                      return (parseFloat(nft.nativePrice || 0) * nativeUsd).toFixed(2);
                                    })()}

                    <div>
                       <div className={`inline-block px-4 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest mb-4 ${chainStyles[selectedAsset.chain]?.color} text-white`}>{selectedAsset.chain}</div>
                       <h1 className="text-4xl font-heading font-black uppercase mb-2 leading-none">{selectedAsset.name}</h1>
                       <p className="text-sm font-bold opacity-40 uppercase tracking-widest mb-8">{selectedAsset.symbol || 'ASSET'}</p>
                       {selectedAsset.isToken && (
                         <div className="mb-8 grid grid-cols-2 gap-4">
                            <div className="p-4 rounded-2xl bg-black/5 border border-white/5">
                                <p className="text-[10px] font-bold uppercase opacity-40 mb-1">Quantity</p>
                                <p className="text-2xl font-heading font-bold">{selectedAsset.balance}</p>
                            </div>
                            <div className="p-4 rounded-2xl bg-black/5 border border-white/5">
                                <p className="text-[10px] font-bold uppercase opacity-40 mb-1">Value USD</p>
                                <p className="text-2xl font-heading font-bold text-emerald-500">${selectedAsset.totalValue}</p>
                            </div>
                         </div>
                       )}
                       <div className="space-y-6">
                          <div>
                             <h3 className="text-[10px] font-bold uppercase tracking-widest opacity-40 mb-3">Attributes</h3>
                             <div className="flex flex-wrap gap-2">
                                {selectedAsset.metadata?.traits?.length > 0 ? selectedAsset.metadata.traits.map((t, i) => (
                                  <div key={i} className="px-3 py-2 rounded-xl bg-blue-500/10 border border-blue-500/20">
                                    <p className="text-[8px] uppercase opacity-60">{t.trait_type}</p>
                                    <p className="text-[10px] font-bold">{t.value}</p>
                                  </div>
                                )) : <p className="text-xs italic opacity-30">No metadata found.</p>}
                             </div>
                          </div>
                          <div className="pt-6 border-t border-white/10">
                             <button onClick={() => setSelectedAsset(null)} className="w-full py-4 rounded-2xl bg-blue-600 hover:bg-blue-500 text-white font-bold uppercase tracking-widest transition-all">Back to Gallery</button>
                          </div>
                       </div>
                    </div>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
